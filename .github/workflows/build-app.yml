name: Build Windows Installer

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-windows-release:
    name: Build and Upload Windows Releases
    runs-on: windows-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Windows executable
        run: uv run pyinstaller --onefile --windowed --name excel-generator main.py

      - name: Build Windows portable directory
        run: uv run pyinstaller --windowed --name excel-generator-portable main.py

      - name: Create zip archive
        run: |
          cd dist
          Compress-Object -Path excel-generator-portable -DestinationPath excel-generator-portable.zip

      - name: Upload releases to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/excel-generator.exe
            dist/excel-generator-portable.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
